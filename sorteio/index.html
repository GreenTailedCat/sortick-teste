<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sortick XP — sorteio</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" href="/sortick-teste/assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/sortick-teste/css/style.css?v=xp1">
</head>
<body>
  <div class="desktop">
    <main class="xp-window">
      <header class="titlebar">
        <div class="title-left"><span class="folder-icon">📁</span><strong>Sortick — Sorteio</strong></div>
        <div class="window-buttons"><button>_</button><button>□</button><button>×</button></div>
      </header>
      <section class="content-area" style="grid-template-columns:1fr;height:500px;padding:8px">
        <section class="main-pane">
          <div class="view-header"><h1>Área de sorteio</h1><p>Este conceito concentra os modos na página inicial.</p></div>
          <div class="app-view">
            <div class="result-big">
              <strong>Sortick XP</strong>
              <span>Volte para o início e escolha um modo.</span>
              <a class="action-button" style="display:inline-grid;place-items:center;text-decoration:none;color:#111" href="/sortick-teste/">Voltar</a>
            </div>
          </div>
        </section>
      </section>
      <footer class="statusbar"><span>0 item(ns)</span><span>Pronto</span><span>Conceito visual XP</span></footer>
    </main>
  </div>
</body>
</html>
