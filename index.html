<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sortick XP — conceito</title>
  <meta name="description" content="Conceito alternativo do Sortick com visual inspirado em aplicativos antigos e Windows XP.">
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" href="/sortick-teste/assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/sortick-teste/css/style.css?v=xp1">
</head>
<body>
  <div class="desktop">
    <div class="desktop-icons" aria-label="Atalhos">
      <button class="desktop-icon" data-open-mode="wheel"><span>🎡</span><strong>Roleta</strong></button>
      <button class="desktop-icon" data-open-mode="names"><span>👥</span><strong>Nomes</strong></button>
      <button class="desktop-icon" data-open-mode="random"><span>#</span><strong>Número</strong></button>
      <button class="desktop-icon" data-open-mode="dice"><span>🎲</span><strong>Dados</strong></button>
    </div>

    <main class="xp-window" role="application" aria-label="Sortick XP">
      <header class="titlebar">
        <div class="title-left">
          <span class="folder-icon">📁</span>
          <strong>Sortick — Sorteios e Decisões</strong>
        </div>
        <div class="window-buttons" aria-hidden="true">
          <button type="button">_</button>
          <button type="button">□</button>
          <button type="button">×</button>
        </div>
      </header>

      <nav class="menubar" aria-label="Menu antigo">
        <button type="button">Arquivo</button>
        <button type="button">Editar</button>
        <button type="button">Modos</button>
        <button type="button">Ferramentas</button>
        <button type="button">Ajuda</button>
        <span class="date-label">qua., 08 de jul. de 2026</span>
      </nav>

      <section class="toolbar" aria-label="Barra de ferramentas">
        <button data-open-mode="wheel">🎡 Nova Roleta</button>
        <button data-open-mode="names">👥 Novo Sorteio</button>
        <button data-open-mode="random">🔢 Número</button>
        <button data-open-mode="coin">🪙 Moeda</button>
        <button data-open-mode="dice">🎲 Dados</button>
        <button data-open-mode="groups">🧩 Grupos</button>
        <button data-open-mode="raffle">🎟️ Cartela</button>
        <span class="toolbar-spacer"></span>
        <input id="globalSearch" type="search" placeholder="🔍 Busca global..." aria-label="Busca global">
      </section>

      <section class="tabs" aria-label="Modos do Sortick">
        <button class="tab active" data-open-mode="home">🏠 Início</button>
        <button class="tab" data-open-mode="wheel">🎡 Roleta</button>
        <button class="tab" data-open-mode="names">👥 Nomes</button>
        <button class="tab" data-open-mode="random">🔢 Número</button>
        <button class="tab" data-open-mode="coin">🪙 Moeda</button>
        <button class="tab" data-open-mode="dice">🎲 Dados</button>
        <button class="tab" data-open-mode="groups">🧩 Grupos</button>
        <button class="tab" data-open-mode="bingo">🔵 Bingo</button>
        <button class="tab" data-open-mode="raffle">🎟️ Cartela</button>
      </section>

      <section class="subtoolbar">
        <button id="newItemButton">➕ Novo</button>
        <input id="quickFilter" type="search" placeholder="🔍 Buscar...">
        <select id="levelFilter">
          <option>Todos os modos</option>
          <option>Decisões rápidas</option>
          <option>Sorteios com lista</option>
          <option>Números</option>
        </select>
      </section>

      <section class="content-area">
        <aside class="left-pane">
          <div class="pane-title">Modos disponíveis</div>
          <button class="tree-item active" data-open-mode="home">▣ Visão geral</button>
          <button class="tree-item" data-open-mode="wheel">▸ Roleta</button>
          <button class="tree-item" data-open-mode="names">▸ Sorteio por nomes</button>
          <button class="tree-item" data-open-mode="random">▸ Número aleatório</button>
          <button class="tree-item" data-open-mode="coin">▸ Cara ou coroa</button>
          <button class="tree-item" data-open-mode="dice">▸ Dados</button>
          <button class="tree-item" data-open-mode="groups">▸ Grupos</button>
          <button class="tree-item" data-open-mode="bingo">▸ Bingo</button>
          <button class="tree-item" data-open-mode="raffle">▸ Cartela</button>

          <div class="pane-title mt">Entradas</div>
          <textarea id="entriesInput">Escolha 1
Escolha 2
Escolha 3
Escolha 4
Escolha 5
Escolha 6
Escolha 7</textarea>
          <div class="small-actions">
            <button id="shuffleEntries">Misturar</button>
            <button id="clearEntries">Limpar</button>
          </div>
        </aside>

        <section class="main-pane">
          <div id="viewHeader" class="view-header">
            <h1>Início</h1>
            <p>Escolha um modo abaixo para começar.</p>
          </div>

          <div id="appView" class="app-view"></div>
        </section>

        <aside class="right-pane">
          <div class="pane-title">Propriedades</div>
          <div id="propertiesBox" class="properties-box"></div>

          <div class="pane-title mt">Resultado</div>
          <div id="resultBox" class="result-box">Nenhum sorteio executado.</div>
        </aside>
      </section>

      <footer class="statusbar">
        <span id="statusCount">0 item(ns)</span>
        <span id="statusMode">Pronto</span>
        <span>Conceito visual XP</span>
      </footer>
    </main>

    <div class="taskbar">
      <button class="start-button">🪟 Iniciar</button>
      <button class="task-button active">📁 Sortick</button>
      <span class="task-spacer"></span>
      <span class="tray">🔊 20:26</span>
    </div>
  </div>

  <script src="/sortick-teste/js/app.js?v=xp1"></script>
</body>
</html>
